name: CI - Validación Landing Page Política

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validar-estructura:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Verificar archivos requeridos
        run: |
          echo "Verificando estructura del proyecto..."
          archivos=("index.html" "css/style.css" "js/script.js" "README.md")
          faltantes=0
          for archivo in "${archivos[@]}"; do
            if [ -f "$archivo" ]; then
              echo "✅ Encontrado: $archivo"
            else
              echo "❌ FALTA: $archivo"
              faltantes=1
            fi
          done
          if [ $faltantes -eq 1 ]; then
            echo "El proyecto no tiene la estructura mínima requerida."
            exit 1
          fi

      - name: Validar contenido básico de index.html
        run: |
          if grep -q "<html" index.html && grep -q "<title" index.html; then
            echo "✅ index.html tiene estructura HTML básica"
          else
            echo "❌ index.html no parece tener una estructura HTML válida"
            exit 1
          fi

      - name: Validar que css/style.css no esté vacío
        run: |
          if [ -s css/style.css ]; then
            echo "✅ css/style.css contiene estilos"
          else
            echo "❌ css/style.css está vacío"
            exit 1
          fi

      - name: Validar que js/script.js no esté vacío
        run: |
          if [ -s js/script.js ]; then
            echo "✅ js/script.js contiene código"
          else
            echo "❌ js/script.js está vacío"
            exit 1
          fi

      - name: Confirmar contenido de README.md
        run: |
          if [ -s README.md ]; then
            echo "✅ README.md tiene contenido"
          else
            echo "❌ README.md está vacío"
            exit 1
          fi